<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Крестики-нолики</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
      color: #e0e0ff;
    }

    .status {
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #a0a0cc;
    }

    .status .highlight {
      font-weight: bold;
      color: #fff;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
      margin: 0 auto 1.5rem;
    }

    .cell {
      width: 110px;
      height: 110px;
      background: #1a1a2e;
      border: 2px solid #2a2a4a;
      border-radius: 12px;
      font-size: 3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #22224a;
      border-color: #5555aa;
      transform: scale(1.04);
    }

    .cell.taken {
      cursor: default;
    }

    .cell.x {
      color: #ff6b6b;
    }

    .cell.o {
      color: #4ecdc4;
    }

    .cell.winner {
      background: #2a2a50;
      border-color: #7777ee;
      animation: pulse 0.6s ease-in-out;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .score-board {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1.5rem;
    }

    .score-item {
      background: #1a1a2e;
      border: 2px solid #2a2a4a;
      border-radius: 10px;
      padding: 0.6rem 1.4rem;
      min-width: 90px;
    }

    .score-item .label {
      font-size: 0.75rem;
      color: #7070aa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-item .value {
      font-size: 1.8rem;
      font-weight: bold;
    }

    .score-item.x-score .value { color: #ff6b6b; }
    .score-item.o-score .value { color: #4ecdc4; }
    .score-item.draw-score .value { color: #aaaacc; }

    button {
      background: #3333aa;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1.8rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button:hover {
      background: #5555cc;
      transform: scale(1.04);
    }

    .mode-toggle {
      margin-bottom: 1.2rem;
    }

    .mode-toggle button {
      background: transparent;
      border: 2px solid #3333aa;
      border-radius: 6px;
      font-size: 0.85rem;
      padding: 0.4rem 1rem;
      margin: 0 0.3rem;
      color: #8888cc;
    }

    .mode-toggle button.active {
      background: #3333aa;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Крестики-нолики</h1>

    <div class="mode-toggle">
      <button id="btn-pvp" class="active" onclick="setMode('pvp')">2 игрока</button>
      <button id="btn-ai" onclick="setMode('ai')">vs ИИ</button>
    </div>

    <div class="status" id="status">Ход игрока <span class="highlight">X</span></div>

    <div class="board" id="board">
      <div class="cell" onclick="handleClick(0)"></div>
      <div class="cell" onclick="handleClick(1)"></div>
      <div class="cell" onclick="handleClick(2)"></div>
      <div class="cell" onclick="handleClick(3)"></div>
      <div class="cell" onclick="handleClick(4)"></div>
      <div class="cell" onclick="handleClick(5)"></div>
      <div class="cell" onclick="handleClick(6)"></div>
      <div class="cell" onclick="handleClick(7)"></div>
      <div class="cell" onclick="handleClick(8)"></div>
    </div>

    <div class="score-board">
      <div class="score-item x-score">
        <div class="label">X</div>
        <div class="value" id="score-x">0</div>
      </div>
      <div class="score-item draw-score">
        <div class="label">Ничья</div>
        <div class="value" id="score-d">0</div>
      </div>
      <div class="score-item o-score">
        <div class="label">O</div>
        <div class="value" id="score-o">0</div>
      </div>
    </div>

    <button onclick="resetGame()">Новая игра</button>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board = Array(9).fill(null);
    let current = 'X';
    let gameOver = false;
    let mode = 'pvp';
    let scores = { X: 0, O: 0, D: 0 };

    const cells = document.querySelectorAll('.cell');
    const statusEl = document.getElementById('status');

    function setMode(m) {
      mode = m;
      document.getElementById('btn-pvp').classList.toggle('active', m === 'pvp');
      document.getElementById('btn-ai').classList.toggle('active', m === 'ai');
      resetGame();
    }

    function handleClick(idx) {
      if (gameOver || board[idx]) return;
      if (mode === 'ai' && current === 'O') return;
      makeMove(idx, current);
      if (!gameOver && mode === 'ai' && current === 'O') {
        setTimeout(aiMove, 350);
      }
    }

    function makeMove(idx, player) {
      board[idx] = player;
      const cell = cells[idx];
      cell.textContent = player;
      cell.classList.add('taken', player.toLowerCase());

      const winner = checkWinner();
      if (winner) {
        highlightWinner(winner.combo);
        statusEl.innerHTML = `Победил <span class="highlight">${player}</span>! 🎉`;
        scores[player]++;
        updateScores();
        gameOver = true;
      } else if (board.every(Boolean)) {
        statusEl.innerHTML = `<span class="highlight">Ничья!</span>`;
        scores.D++;
        updateScores();
        gameOver = true;
      } else {
        current = player === 'X' ? 'O' : 'X';
        statusEl.innerHTML = `Ход игрока <span class="highlight">${current}</span>`;
      }
    }

    function checkWinner() {
      for (const combo of WINS) {
        const [a, b, c] = combo;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { player: board[a], combo };
        }
      }
      return null;
    }

    function highlightWinner(combo) {
      combo.forEach(i => cells[i].classList.add('winner'));
    }

    function updateScores() {
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-d').textContent = scores.D;
    }

    function resetGame() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      statusEl.innerHTML = `Ход игрока <span class="highlight">X</span>`;
    }

    // Minimax AI
    function aiMove() {
      const idx = bestMove();
      makeMove(idx, 'O');
    }

    function bestMove() {
      let best = -Infinity, move = -1;
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'O';
          const score = minimax(board, 0, false);
          board[i] = null;
          if (score > best) { best = score; move = i; }
        }
      }
      return move;
    }

    function minimax(b, depth, isMax) {
      const w = checkWinnerBoard(b);
      if (w === 'O') return 10 - depth;
      if (w === 'X') return depth - 10;
      if (b.every(Boolean)) return 0;

      if (isMax) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) {
            b[i] = 'O';
            best = Math.max(best, minimax(b, depth + 1, false));
            b[i] = null;
          }
        }
        return best;
      } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) {
            b[i] = 'X';
            best = Math.min(best, minimax(b, depth + 1, true));
            b[i] = null;
          }
        }
        return best;
      }
    }

    function checkWinnerBoard(b) {
      for (const [a, c, d] of WINS) {
        if (b[a] && b[a] === b[c] && b[a] === b[d]) return b[a];
      }
      return null;
    }
  </script>
</body>
</html>
